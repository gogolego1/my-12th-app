<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 데이터 심층 분석 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F2EE;
  --surface: #FFFFFF;
  --surface2: #F9F8F6;
  --blue: #1A56C4;
  --blue-lt: #EBF1FB;
  --blue-dk: #143FA0;
  --green: #1A7A4A;
  --green-lt: #E8F5EE;
  --amber: #B54708;
  --amber-lt: #FEF3E2;
  --red: #B42318;
  --red-lt: #FEE4E2;
  --violet: #5B21B6;
  --violet-lt: #EDE9FE;
  --slate: #344054;
  --border: #E4E0D8;
  --border2: #D0CABD;
  --text: #101828;
  --text2: #344054;
  --muted: #667085;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --display: 'Plus Jakarta Sans', sans-serif;
  --r: 10px;
  --r-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13.5px; line-height: 1.65; }

/* HEADER */
header {
  background: #fff;
  border-bottom: 1.5px solid var(--border);
  padding: 0 2rem;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.hlogo { display: flex; align-items: center; gap: 10px; }
.hlogo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--blue); }
.hlogo-text { font-family: var(--display); font-size: .9rem; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
.hright { display: flex; align-items: center; gap: 8px; }
.hbadge {
  font-size: 10px; font-weight: 500; padding: 4px 11px; border-radius: 20px;
  font-family: var(--mono); letter-spacing: .02em;
  background: var(--blue-lt); color: var(--blue); border: 1px solid #C5D8F8;
}

/* WRAP */
.wrap { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }

/* EYEBROW */
.eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase;
  color: var(--muted); margin-bottom: .6rem;
}

/* UPLOAD */
.upload-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 1.25rem; }
@media(max-width:580px){ .upload-grid { grid-template-columns: 1fr; } }

.uzone {
  background: var(--surface); border: 1.5px dashed var(--border2); border-radius: var(--r-lg);
  padding: 1rem 1.1rem; cursor: pointer; transition: all .18s; position: relative; min-height: 110px;
}
.uzone:hover { border-color: var(--blue); background: var(--blue-lt); }
.uzone.filled { border-style: solid; border-color: var(--blue); background: var(--blue-lt); }
.uzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.uz-top { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.uz-num { width: 20px; height: 20px; border-radius: 6px; background: var(--blue); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: var(--mono); }
.uz-name { font-size: 13px; font-weight: 600; color: var(--text); }
.uz-hint { font-size: 11px; color: var(--muted); padding-left: 27px; }
.uz-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; padding-left: 27px; }
.ftag { font-size: 10.5px; background: var(--blue); color: #fff; padding: 2px 9px; border-radius: 20px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.uzone-preview { width: calc(100% - 27px); max-height: 60px; object-fit: contain; border-radius: 6px; border: 1px solid var(--border); margin-top: 5px; margin-left: 27px; }

/* RUN ROW */
.run-row { display: flex; gap: 10px; align-items: center; margin-bottom: 1.75rem; flex-wrap: wrap; }
.btn-run {
  background: var(--blue); color: #fff; border: none; border-radius: var(--r);
  padding: 10px 26px; font-size: 13.5px; font-weight: 600; font-family: var(--sans);
  cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 7px;
  letter-spacing: -.01em; box-shadow: 0 1px 2px rgba(0,0,0,.1), 0 0 0 1px var(--blue-dk);
}
.btn-run:hover:not(:disabled) { background: var(--blue-dk); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,86,196,.3), 0 0 0 1px var(--blue-dk); }
.btn-run:disabled { background: #D0D5DD; box-shadow: none; cursor: not-allowed; }
.run-hint { font-size: 11.5px; color: var(--muted); }

/* PROGRESS */
.prog-wrap { height: 2px; background: var(--border); border-radius: 2px; margin-bottom: .9rem; display: none; overflow: hidden; }
.prog-bar { height: 2px; background: var(--blue); border-radius: 2px; width: 0%; transition: width .5s ease; }
.status { font-size: 11.5px; color: var(--muted); font-family: var(--mono); display: none; margin-bottom: 1.25rem; }
.err-box { background: var(--red-lt); border: 1px solid #FECDCA; border-radius: var(--r); padding: .75rem 1rem; color: var(--red); font-size: 13px; margin-bottom: 1rem; display: none; white-space: pre-wrap; }

/* RESULT */
.result { display: none; }
.result.show { display: block; animation: fadeUp .35s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* TABS */
.tab-bar {
  display: flex; gap: 0; border-bottom: 1.5px solid var(--border);
  background: var(--surface); border-radius: var(--r-lg) var(--r-lg) 0 0;
  overflow-x: auto; padding: 0 .5rem;
}
.tbtn {
  padding: 11px 18px; border: none; background: none; font-size: 12.5px; font-family: var(--sans);
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1.5px;
  white-space: nowrap; transition: all .15s; font-weight: 500; display: flex; align-items: center; gap: 6px;
}
.tbtn:hover { color: var(--blue); }
.tbtn.on { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.tbtn .tnum { width: 18px; height: 18px; border-radius: 50%; background: var(--border); color: var(--muted); font-size: 10px; display: flex; align-items: center; justify-content: center; font-family: var(--mono); }
.tbtn.on .tnum { background: var(--blue); color: #fff; }

.tab-body { background: var(--surface); border-radius: 0 0 var(--r-lg) var(--r-lg); border: 1.5px solid var(--border); border-top: none; }
.tpanel { display: none; padding: 1.5rem; }
.tpanel.on { display: block; }

/* SECTION HEADERS inside panels */
.sec-head {
  display: flex; align-items: center; gap: 8px; margin: 0 0 .9rem;
  padding-bottom: .6rem; border-bottom: 1px solid var(--border);
}
.sec-head + .sec-head, .item-block + .sec-head { margin-top: 1.6rem; }
.sec-icon { font-size: 14px; }
.sec-title { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
.sec-title.blue   { color: var(--blue); }
.sec-title.green  { color: var(--green); }
.sec-title.amber  { color: var(--amber); }
.sec-title.red    { color: var(--red); }
.sec-title.violet { color: var(--violet); }

/* ITEM BLOCKS (numbered cards) */
.item-block {
  border-radius: var(--r); border: 1px solid var(--border); overflow: hidden;
  margin-bottom: .6rem;
}
.item-head {
  display: flex; align-items: flex-start; gap: 10px; padding: .75rem 1rem;
  border-bottom: 1px solid var(--border);
}
.item-head.blue   { background: var(--blue-lt);   border-bottom-color: #C5D8F8; }
.item-head.green  { background: var(--green-lt);  border-bottom-color: #B3DFC4; }
.item-head.amber  { background: var(--amber-lt);  border-bottom-color: #F9DBAF; }
.item-head.red    { background: var(--red-lt);    border-bottom-color: #FECDCA; }
.item-head.violet { background: var(--violet-lt); border-bottom-color: #C4B5FD; }
.item-head.plain  { background: var(--surface2);  }

.item-num {
  width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
  font-family: var(--mono);
}
.blue   .item-num { background: var(--blue);   color: #fff; }
.green  .item-num { background: var(--green);  color: #fff; }
.amber  .item-num { background: var(--amber);  color: #fff; }
.red    .item-num { background: var(--red);    color: #fff; }
.violet .item-num { background: var(--violet); color: #fff; }
.plain  .item-num { background: var(--border2); color: var(--text2); }

.item-label { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
.item-label small { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 4px; }
.item-body { padding: .7rem 1rem; font-size: 13px; color: var(--text2); line-height: 1.75; background: var(--surface); }
.item-body p { margin-bottom: .3rem; }
.item-body p:last-child { margin-bottom: 0; }

/* ALERT ROWS */
.al { display: flex; gap: 8px; align-items: baseline; padding: .4rem 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.6; }
.al:last-child { border-bottom: none; }
.al-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
.al-dot.g { background: var(--green); }
.al-dot.r { background: var(--red); }
.al-dot.a { background: var(--amber); }
.al-dot.b { background: var(--blue); }
.al-dot.v { background: var(--violet); }

/* SEL BAR CHART */
.sel-bars { display: flex; flex-direction: column; gap: 6px; }
.sel-row { display: flex; align-items: center; gap: 8px; }
.sel-label { font-size: 11.5px; color: var(--text2); width: 80px; flex-shrink: 0; }
.sel-track { flex: 1; height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
.sel-fill { height: 100%; border-radius: 4px; background: var(--blue); }
.sel-val { font-size: 11px; color: var(--muted); width: 40px; text-align: right; font-family: var(--mono); }

/* HEAL CARDS */
.heal-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin: .5rem 0; }
@media(max-width:580px){ .heal-grid { grid-template-columns: repeat(2,1fr); } }
.hcard { border-radius: var(--r); padding: .85rem .75rem; text-align: center; border: 1px solid; }
.hcard-H { background: #EBF5FF; border-color: #BDD7FB; }
.hcard-E { background: #EDFDF5; border-color: #A6EDD0; }
.hcard-A { background: #FEF6EE; border-color: #FBCF97; }
.hcard-L { background: #F5F3FF; border-color: #C4B5FD; }
.hstep { font-family: var(--display); font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; }
.hcard-H .hstep { color: #1A56C4; }
.hcard-E .hstep { color: #1A7A4A; }
.hcard-A .hstep { color: #B54708; }
.hcard-L .hstep { color: #5B21B6; }
.hdesc { font-size: 11px; color: var(--text2); line-height: 1.55; }

/* NOTICE BOX */
.notice { background: var(--amber-lt); border: 1px solid #F9DBAF; border-radius: var(--r); padding: .8rem 1rem; font-size: 13px; color: #7A3D06; line-height: 1.7; margin-top: .6rem; }

/* RAW */
.rawbox { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 1rem 1.1rem; font-family: var(--mono); font-size: 11.5px; line-height: 1.9; color: var(--muted); white-space: pre-wrap; word-break: break-all; }

/* DOWNLOAD */
.dl-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1.25rem; padding-top: 1.1rem; border-top: 1px solid var(--border); }
.btnd { padding: 8px 16px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface); color: var(--text2); font-size: 12.5px; font-family: var(--sans); cursor: pointer; transition: all .12s; font-weight: 500; }
.btnd:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
strong { font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="hlogo">
    <div class="hlogo-dot"></div>
    <div class="hlogo-text">학생 데이터 심층 분석 시스템</div>
  </div>
  <div class="hright">
    <span class="hbadge">Gemini 2.5 Flash</span>
    <span class="hbadge">Vercel Serverless</span>
  </div>
</header>

<div class="wrap">
  <div class="eyebrow">검사 자료 업로드</div>
  <div class="upload-grid" id="uploadGrid"></div>
  <div class="run-row">
    <button class="btn-run" id="runBtn" disabled onclick="run()">
      🔬 분석 실행
    </button>
    <span class="run-hint">이미지(PNG·JPG) 또는 PDF를 1개 이상 등록하세요.</span>
  </div>

  <div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
  <div class="status" id="status"></div>
  <div class="err-box" id="errBox"></div>

  <div class="result" id="result">
    <div class="eyebrow">분석 결과</div>
    <div class="tab-bar">
      <button class="tbtn on" onclick="tab(0,this)"><span class="tnum">ⓐ</span>학습자 특성 분석</button>
      <button class="tbtn"    onclick="tab(1,this)"><span class="tnum">ⓑ</span>교육과정 설계 반영</button>
      <button class="tbtn"    onclick="tab(2,this)"><span class="tnum">ⓒ</span>평가 설계 반영</button>
      <button class="tbtn"    onclick="tab(3,this)"><span class="tnum">≡</span>수합 원문</button>
    </div>
    <div class="tab-body">
      <div class="tpanel on" id="tp0"></div>
      <div class="tpanel"    id="tp1"></div>
      <div class="tpanel"    id="tp2"></div>
      <div class="tpanel"    id="tp3"></div>
    </div>
    <div class="dl-row">
      <button class="btnd" onclick="dlTxt()">📥 분석 결과 (.txt)</button>
      <button class="btnd" onclick="dlHtml()">📥 HTML 리포트</button>
    </div>
  </div>
</div>

<script>
const EXAMS = [
  { key:'vark',    no:'01', name:'학습유형검사',    hint:'VARK 결과지 — 이미지·PDF' },
  { key:'sel',     no:'02', name:'사회정서역량검사', hint:'SEL 영역별 결과지' },
  { key:'holland', no:'03', name:'진로탐색검사',     hint:'Holland 유형 코드 포함' },
  { key:'diag',    no:'04', name:'기초학력진단검사', hint:'교과 성취 진단 결과지' },
];

const FILES = {};
let rawText = '', analysis = { a:'', b:'', c:'' };

// Build upload zones
const grid = document.getElementById('uploadGrid');
EXAMS.forEach(({ key, no, name, hint }) => {
  const d = document.createElement('div');
  d.className = 'uzone'; d.id = 'zone_' + key;
  d.innerHTML = `
    <input type="file" accept="image/*,.pdf" multiple onchange="onFile('${key}',this)">
    <div class="uz-top">
      <div class="uz-num">${no}</div>
      <div class="uz-name">${name}</div>
    </div>
    <div class="uz-hint">${hint}</div>
    <div class="uz-tags" id="tags_${key}"></div>`;
  grid.appendChild(d);
});

function onFile(key, inp) {
  FILES[key] = Array.from(inp.files);
  const zone = document.getElementById('zone_' + key);
  const tags  = document.getElementById('tags_' + key);
  zone.classList.add('filled'); tags.innerHTML = '';
  FILES[key].forEach((f, i) => {
    const t = document.createElement('span');
    t.className = 'ftag'; t.title = f.name; t.textContent = f.name;
    tags.appendChild(t);
    if (i === 0 && f.type.startsWith('image/')) {
      const r = new FileReader();
      r.onload = e => {
        const img = document.createElement('img');
        img.className = 'uzone-preview'; img.src = e.target.result;
        tags.appendChild(img);
      };
      r.readAsDataURL(f);
    }
  });
  checkReady();
}
function checkReady() {
  document.getElementById('runBtn').disabled = !Object.values(FILES).some(v => v?.length);
}
function toB64(file) {
  return new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
}
function mime(f) {
  const ext=f.name.split('.').pop().toLowerCase();
  return f.type||({pdf:'application/pdf',png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',webp:'image/webp'})[ext]||'image/png';
}

async function run() {
  setP(0,'분석 데이터 수합 준비 중...');
  showErr('');
  document.getElementById('result').classList.remove('show');

  const examKeys = EXAMS.filter(e => FILES[e.key]?.length);
  const examTexts = {};
  let step = 0;

  for (const ex of examKeys) {
    step++;
    setP((step / (examKeys.length+1)) * 60, `${ex.name} 텍스트 추출 중...`);
    const cc = [{ type:'text', text:`첨부 이미지는 학생의 [${ex.name}] 결과지입니다. 수치, 점수, 영역별 결과, 서술형 내용을 빠짐없이 정밀 추출해 주세요. 학생 이름은 '이 학생'으로 대체.` }];
    for (const f of FILES[ex.key]) {
      const b = await toB64(f);
      cc.push({ type:'image_url', image_url:{ url:`data:${mime(f)};base64,${b}` } });
    }
    const r = await proxy([{ role:'user', content:cc }], 3000);
    if (r.error) { showErr(r.error); return; }
    examTexts[ex.name] = r.text;
  }

  setP(75,'종합 심층 분석 추론 중...');
  rawText = Object.entries(examTexts).map(([n,t])=>`${'='.repeat(48)}\n[${n}]\n${'='.repeat(48)}\n${t}`).join('\n\n');

  const prompt = `
당신은 전문 교육 상담가입니다. 아래 학생의 각종 검사 결과를 바탕으로 교사용 종합 학습자 진단 보고서를 작성하세요.
SECTION_A, SECTION_B, SECTION_C 헤더와 하위 ### 헤더를 반드시 유지하세요.
각 항목은 구체적인 수치와 근거를 포함하여 풍부하게 작성하세요.

[검사 원문]
${rawText}

---

## SECTION_A 학습자 특성 분석

### 인지적 특성
강점:
- (강점 항목들을 dash로 나열, 수치 포함)
취약:
- (취약 항목들)
종합:
(2~3문장 요약)

### 정의적 특성
SEL영역:
- (각 SEL 영역별 수준과 의미)
진로흥미:
- (Holland 유형 분석)
종합:
(2~3문장 요약)

### 행동적 특성
- (수업 태도, 과제 수행, 사회적 행동, 자기조절 등 구체적 항목들)
종합:
(2~3문장 요약)

## SECTION_B 교육과정 설계 반영

### 강점 — 바로 활용할 수 있는 것
① (강점 제목)
(설명)
② (강점 제목)
(설명)
③ (강점 제목)
(설명)

### 지원이 필요한 영역
① (지원 영역 제목)
(구체적 지원 전략)
② (지원 영역 제목)
(구체적 지원 전략)
③ (지원 영역 제목)
(구체적 지원 전략)

### HEAL 단계별 추천 역할
- H단계 (탐구·Hook): (구체적 역할과 활동)
- E단계 (탐구·Explore): (구체적 역할과 활동)
- A단계 (적용·Apply): (구체적 역할과 활동)
- L단계 (공유·Launch): (구체적 역할과 활동)

### 핵심 질문 개인화 방향
- (질문 유형 1과 예시)
- (질문 유형 2와 예시)

async function proxy(messages, maxTokens) {
  try {
    const resp = await fetch('/api/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ max_tokens:maxTokens, messages })
    });
    const data = await resp.json();
    if (data.error_detected) return { error:`[설정 오류]\n${data.message}` };
    if (!resp.ok) return { error:`서버 오류 (${resp.status})` };
    return { text: data.choices[0].message.content || '' };
  } catch(e) {
    return { error:`네트워크 프록시 연결 장애: ${e.message}\n(Vercel 서버리스 연동이 올바르지 않습니다.)` };
  }
}

function cutSection(text, start, end) {
  const si = text.indexOf('## ' + start); if (si === -1) return text;
  const ei = end ? text.indexOf('## ' + end, si+1) : text.length;
  return text.slice(si + ('## '+start).length, ei===-1?text.length:ei).trim();
}

/* ── RENDER ⓐ: 인지/정의/행동 ── */
function renderA(md) {
  const el = document.getElementById('tp0');
  const domains = [
    { key:'인지적 특성', color:'blue',   icon:'🧠', label:'인지적 특성 (Cognitive)' },
    { key:'정의적 특성', color:'violet', icon:'💚', label:'정의적 특성 (Affective)' },
    { key:'행동적 특성', color:'green',  icon:'🤝', label:'행동적 특성 (Behavioral)' },
  ];
  let html = '';
  domains.forEach(({ key, color, icon, label }) => {
    const body = extractSub(md, key);
    html += `
      <div class="sec-head">
        <span class="sec-icon">${icon}</span>
        <span class="sec-title ${color}">${label}</span>
      </div>
      ${renderDomainBody(body, color)}`;
  });
  el.innerHTML = html;
}

function renderDomainBody(text, color) {
  if (!text) return `<div class="item-block"><div class="item-body" style="color:var(--muted)">내용 없음</div></div>`;
  // 줄 단위로 파싱해 numbered blocks 또는 bullet 처리
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  let html = '';
  let inBlock = false;
  let blockLabel = '', blockContent = [];

  const flushBlock = () => {
    if (!blockLabel) return;
    html += buildItem(blockContent.join('\n'), color, blockLabel);
    blockLabel = ''; blockContent = [];
  };

  lines.forEach(line => {
    // 강점:/취약:/SEL영역:/진로흥미:/종합: 등 콜론 헤더
    if (/^(강점|취약|SEL영역|진로흥미|종합|수업태도|과제수행|사회적행동):/.test(line)) {
      flushBlock();
      blockLabel = line.replace(/:$/, '').replace(/:/,'');
      inBlock = true;
    } else if (line.startsWith('- ')) {
      if (inBlock) blockContent.push(line);
      else {
        // standalone bullet
        html += `<div class="al"><div class="al-dot ${color[0]}"></div><div>${esc(line.slice(2))}</div></div>`;
      }
    } else {
      if (inBlock) blockContent.push(line);
      else html += `<p style="margin:.3rem 0;font-size:13px;color:var(--text2)">${esc(line)}</p>`;
    }
  });
  flushBlock();
  return html;
}

function buildItem(bodyText, color, label) {
  const lines = bodyText.split('\n').map(l=>l.trim()).filter(Boolean);
  const inner = lines.map(l => {
    if (l.startsWith('- ')) return `<div class="al"><div class="al-dot ${color[0]}"></div><div>${esc(l.slice(2))}</div></div>`;
    return `<p>${esc(l)}</p>`;
  }).join('');
  return `
    <div class="item-block">
      <div class="item-head ${color}">
        <div class="item-label">${esc(label)}</div>
      </div>
      <div class="item-body">${inner}</div>
    </div>`;
}

/* ── RENDER ⓒ: 평가 설계 ── */
function renderC(md) {
  const el = document.getElementById('tp2');
  const subs = [
    { key:'적합한 평가 유형',       color:'blue',  icon:'📋', type:'numbered' },

    { key:'성취기준 도달 지원 방안',color:'violet',icon:'🚀', type:'numbered' },
  ];
  el.innerHTML = renderSubSections(md, subs);

function renderSubSections(md, subs) {
  let html = '';
  subs.forEach(({ key, color, icon, type }) => {
    const body = extractSub(md, key);
    html += `<div class="sec-head"><span class="sec-icon">${icon}</span><span class="sec-title ${color}">${esc(key)}</span></div>`;
    if (type === 'heal') {
      html += renderHeal(body);
    } else if (type === 'notice') {
      html += `<div class="notice">${esc(body)}</div>`;
    } else if (type === 'numbered') {
      html += renderNumbered(body, color);
    } else {
      html += renderBullets(body, color);
    }
  });
  return html;
}

function renderNumbered(text, color) {
  // ① ② ③ 등 원문자로 구분
  const blocks = text.split(/^(?=[①②③④⑤⑥])/m).filter(s => s.trim());
  if (blocks.length <= 1) {
    // fallback: dash 목록
    return renderBullets(text, color);
  }
  return blocks.map((block, i) => {
    const lines = block.split('\n').map(l=>l.trim()).filter(Boolean);
    const labelLine = lines[0] || '';
    const label = labelLine.replace(/^[①②③④⑤⑥]\s*/, '');
    const body = lines.slice(1).join('\n');
    return `
      <div class="item-block">
        <div class="item-head ${color}">
          <div class="item-num">${i+1}</div>
          <div class="item-label">${esc(label)}</div>
        </div>
        <div class="item-body">${renderBullets(body, color, true)}</div>
      </div>`;
  }).join('');
}

function renderBullets(text, color, inline=false) {
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const dotCls = color ? color[0] : 'b';
  let html = '';
  lines.forEach(l => {
    if (l.startsWith('- ')) {
      html += `<div class="al"><div class="al-dot ${dotCls}"></div><div>${esc(l.slice(2))}</div></div>`;
    } else {
      html += `<p style="margin:.3rem 0;font-size:13px;color:var(--text2)">${esc(l)}</p>`;
    }
  });
  return inline ? html : `<div class="item-block"><div class="item-body">${html}</div></div>`;
}

function renderHeal(text) {
  const steps = [
    { k:'H', re:/- H단계[^:]*:\s*([\s\S]*?)(?=\n- [EAL]단계|\n###|$)/ },
    { k:'E', re:/- E단계[^:]*:\s*([\s\S]*?)(?=\n- [AL]단계|\n###|$)/ },
    { k:'A', re:/- A단계[^:]*:\s*([\s\S]*?)(?=\n- L단계|\n###|$)/ },
    { k:'L', re:/- L단계[^:]*:\s*([\s\S]*?)(?=\n###|$)/ },
  ];
  const cards = steps.map(({ k, re }) => {
    const m = text.match(re);
    const desc = m ? m[1].trim().replace(/\n/g,' ') : '—';
    return `<div class="hcard hcard-${k}"><div class="hstep">${k}</div><div class="hdesc">${esc(desc)}</div></div>`;
  }).join('');
  return `<div class="heal-grid">${cards}</div>`;
}

function extractSub(md, heading) {
  const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`### ${escaped}([\\s\\S]*?)(?=### |$)`);
  const m = md.match(re);
  return m ? m[1].trim() : '';
}
