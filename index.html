<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 데이터 심층 분석 (Gemini 버전)</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2EFE8;
  --surface: #FFFFFF;
  --blue: #1565C0;
  --blue-lt: #E3F0FF;
  --blue-md: #1976D2;
  --green: #2E7D32;
  --green-lt: #E8F5E9;
  --amber: #E65100;
  --amber-lt: #FFF3E0;
  --red: #C62828;
  --red-lt: #FFEBEE;
  --border: #DDD8CE;
  --text: #1A1A2E;
  --muted: #78909C;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.65; }

/* 헤더 */
header {
  background: var(--blue);
  padding: 1.2rem 2rem;
  display: flex; align-items: center; gap: 1rem;
  border-bottom: 3px solid #0D47A1;
}
header h1 { font-size: 1.1rem; font-weight: 500; color: #fff; letter-spacing: -.01em; }
.hchip {
  font-size: 10.5px; background: rgba(255,255,255,.15); color: rgba(255,255,255,.9);
  padding: 3px 10px; border-radius: 20px; font-family: var(--mono);
}

.wrap { max-width: 980px; margin: 0 auto; padding: 2rem 1.5rem; }

/* 업로드 4칸 */
.upload-grid {
  display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 1.25rem;
}
@media(max-width:580px){ .upload-grid { grid-template-columns: 1fr; } }

.uzone {
  background: var(--surface); border: 1.5px dashed var(--border);
  border-radius: 12px; padding: 1rem 1.1rem; cursor: pointer;
  transition: border-color .2s, background .15s; position: relative; min-height: 110px;
}
.uzone:hover { border-color: var(--blue); background: #F7FBFF; }
.uzone.filled { border-style: solid; border-color: var(--blue); }
.uzone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.uzone-num { font-size: 10px; font-weight: 700; color: var(--blue); letter-spacing: .08em; text-transform: uppercase; }
.uzone-name { font-size: 13.5px; font-weight: 500; color: var(--text); margin: 2px 0 3px; }
.uzone-hint { font-size: 11.5px; color: var(--muted); }
.uzone-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.ftag {
  font-size: 11px; background: var(--blue-lt); color: var(--blue);
  padding: 2px 9px; border-radius: 10px; max-width: 180px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.uzone-preview {
  width: 100%; max-height: 72px; object-fit: contain;
  border-radius: 6px; border: 0.5px solid var(--border); margin-top: 6px;
}

/* 실행 버튼 */
.run-row { display: flex; gap: 10px; margin-bottom: 1.75rem; align-items: center; }
.btn-run {
  background: var(--blue); color: #fff; border: none;
  border-radius: 8px; padding: 11px 32px;
  font-size: 14px; font-weight: 500; font-family: var(--sans);
  cursor: pointer; transition: background .15s, transform .1s;
  display: flex; align-items: center; gap: 8px;
}
.btn-run:hover:not(:disabled) { background: var(--blue-md); }
.btn-run:active:not(:disabled) { transform: scale(.98); }
.btn-run:disabled { background: #B0BEC5; cursor: not-allowed; }
.run-hint { font-size: 11.5px; color: var(--muted); }

/* 진행 */
.prog-wrap { background: var(--border); border-radius: 4px; height: 4px; margin-bottom: .8rem; display: none; overflow: hidden; }
.prog-bar  { height: 4px; background: var(--blue); border-radius: 4px; width: 0%; transition: width .45s ease; }
.status    { font-size: 12px; color: var(--muted); font-family: var(--mono); display: none; margin-bottom: 1.25rem; }
.err-box   { background: var(--red-lt); border: 1px solid var(--red); border-radius: 8px; padding: .75rem 1rem; color: var(--red); font-size: 13px; margin-bottom: 1rem; display: none; }

/* 결과 */
.result { display: none; }
.result.show { display: block; }

.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; }
.tbtn {
  padding: 9px 20px; border: none; background: none;
  font-size: 13px; font-family: var(--sans); color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -2px; white-space: nowrap; transition: color .15s;
}
.tbtn.on { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }
.tpanel { display: none; }
.tpanel.on { display: block; }

.stitle {
  font-size: 11px; font-weight: 700; color: var(--blue);
  text-transform: uppercase; letter-spacing: .1em;
  border-left: 3px solid var(--blue); padding-left: 8px;
  margin: 1.4rem 0 .65rem;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: .65rem;
  line-height: 1.75;
}
.card p { margin-bottom: .45rem; }
.card p:last-child { margin-bottom: 0; }

.al {
  border-left: 3px solid; border-radius: 0 8px 8px 0;
  padding: .6rem .9rem; margin: .35rem 0; font-size: 13px; line-height: 1.65;
}
.al-g { background: var(--green-lt); border-color: var(--green); color: #1B5E20; }
.al-a { background: var(--amber-lt); border-color: var(--amber); color: #BF360C; }
.al-b { background: var(--blue-lt);  border-color: var(--blue);  color: #0D47A1; }
.al-r { background: var(--red-lt);   border-color: var(--red);   color: #B71C1C; }

/* HEAL 카드 */
.heal-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin: .8rem 0; }
@media(max-width:580px){ .heal-row { grid-template-columns: repeat(2,1fr); } }
.hcard { border-radius: 10px; padding: .85rem .7rem; text-align: center; }
.hcard-H { background: #E3F0FF; border: 1px solid #90CAF9; }
.hcard-E { background: #E8F5E9; border: 1px solid #A5D6A7; }
.hcard-A { background: #FFF3E0; border: 1px solid #FFCC80; }
.hcard-L { background: #F3E5F5; border: 1px solid #CE93D8; }
.hstep { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
.hcard-H .hstep { color: var(--blue); }
.hcard-E .hstep { color: var(--green); }
.hcard-A .hstep { color: var(--amber); }
.hcard-L .hstep { color: #7B1FA2; }
.hdesc { font-size: 11.5px; color: var(--text); line-height: 1.5; }

/* 원문 */
.rawbox {
  background: #FAFAF7; border: 1px solid var(--border); border-radius: 10px;
  padding: 1rem 1.2rem; font-family: var(--mono); font-size: 12px;
  line-height: 1.8; color: var(--muted); white-space: pre-wrap; word-break: break-all;
}

/* 다운로드 */
.dl-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.btnd {
  padding: 8px 18px; border: 1px solid var(--blue); border-radius: 8px;
  background: var(--surface); color: var(--blue); font-size: 13px;
  font-family: var(--sans); cursor: pointer; transition: background .15s;
}
.btnd:hover { background: var(--blue-lt); }

hr { border: none; border-top: 1px solid var(--border); margin: .9rem 0; }
strong { font-weight: 500; }
</style>
</head>
<body>

<header>
  <h1>🔬 학생 데이터 심층 분석</h1>
  <span class="hchip">Gemini 1.5 Pro · 4개 검사 통합 분석</span>
</header>

<div class="wrap">
  <div class="upload-grid" id="uploadGrid"></div>

  <div class="run-row">
    <button class="btn-run" id="runBtn" disabled onclick="run()">
      🔬 분석 실행
    </button>
    <span class="run-hint">이미지(PNG·JPG·WEBP) 또는 PDF · 각 검사별 여러 장 가능</span>
  </div>

  <div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
  <div class="status" id="status"></div>
  <div class="err-box" id="errBox"></div>

  <div class="result" id="result">
    <div class="tabs">
      <button class="tbtn on"  onclick="tab(0,this)">ⓐ 인지·정의·행동 특성</button>
      <button class="tbtn"     onclick="tab(1,this)">ⓑ 교육적 시사점</button>
      <button class="tbtn"     onclick="tab(2,this)">ⓒ 수업설계 제안</button>
      <button class="tbtn"     onclick="tab(3,this)">📄 수합 원문</button>
    </div>
    <div class="tpanel on" id="tp0"></div>
    <div class="tpanel"    id="tp1"></div>
    <div class="tpanel"    id="tp2"></div>
    <div class="tpanel"    id="tp3"></div>
    <div class="dl-row">
      <button class="btnd" onclick="dlTxt()">📥 분석 결과 다운로드 (.txt)</button>
      <button class="btnd" onclick="dlHtml()">📥 HTML 리포트 다운로드</button>
    </div>
  </div>
</div>

<script>
const EXAMS = [
  { key:'vark',    no:'①', name:'학습유형검사',    hint:'이미지·PDF 여러 장 가능' },
  { key:'sel',     no:'②', name:'사회정서역량검사', hint:'영역별 결과지 모두 업로드' },
  { key:'holland', no:'③', name:'진로탐색검사',     hint:'레이더 차트·점수표 포함' },
  { key:'diag',    no:'④', name:'기초학력진단검사', hint:'수학·과학 등 교과별 파일' },
];

const FILES = {};
let rawText = '', analysis = { a:'', b:'', c:'' };

// ── 업로드 칸 생성 ────────────────────────────────
const grid = document.getElementById('uploadGrid');
EXAMS.forEach(({ key, no, name, hint }) => {
  const d = document.createElement('div');
  d.className = 'uzone'; d.id = 'zone_' + key;
  d.innerHTML = `
    <input type="file" accept="image/*,.pdf" multiple onchange="onFile('${key}',this)">
    <div class="uzone-num">${no}</div>
    <div class="uzone-name">${name}</div>
    <div class="uzone-hint">${hint}</div>
    <div class="uzone-tags" id="tags_${key}"></div>
  `;
  grid.appendChild(d);
});

function onFile(key, inp) {
  FILES[key] = Array.from(inp.files);
  const zone = document.getElementById('zone_' + key);
  const tags  = document.getElementById('tags_' + key);
  zone.classList.add('filled');
  tags.innerHTML = '';
  FILES[key].forEach((f, i) => {
    const t = document.createElement('span');
    t.className = 'ftag'; t.title = f.name; t.textContent = f.name;
    tags.appendChild(t);
    if (i === 0 && f.type.startsWith('image/')) {
      const r = new FileReader();
      r.onload = e => {
        const img = document.createElement('img');
        img.className = 'uzone-preview'; img.src = e.target.result;
        tags.appendChild(img);
      };
      r.readAsDataURL(f);
    }
  });
  checkReady();
}

function checkReady() {
  const hasFile = Object.values(FILES).some(v => v?.length);
  document.getElementById('runBtn').disabled = !hasFile;
}

// ── 파일 유틸 ────────────────────────────────────
function toB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function mime(f) {
  if (f.type) return f.type;
  const ext = f.name.split('.').pop().toLowerCase();
  return ({ pdf:'application/pdf', png:'image/png', jpg:'image/jpeg',
            jpeg:'image/jpeg', webp:'image/webp' })[ext] || 'image/png';
}

// ── 메인 실행 ────────────────────────────────────
async function run() {
  setP(0, '분석 준비 중...');
  showErr('');
  document.getElementById('result').classList.remove('show');

  const examKeys   = EXAMS.filter(e => FILES[e.key]?.length);
  const total      = examKeys.length + 1;
  let   step       = 0;
  const examTexts  = {};

  for (const ex of examKeys) {
    step++;
    setP((step / total) * 60, `${ex.name} 텍스트 수합 중... (${FILES[ex.key].length}개 파일)`);

    // Gemini OpenAI 호환 멀티모달 규격으로 메시지 조립
    const contentContents = [];
    contentContents.push({ type: 'text', text: buildExtractPrompt(ex.name) });

    for (const f of FILES[ex.key]) {
      const b64Data = await toB64(f);
      contentContents.push({
        type: 'image_url',
        image_url: { url: `data:${mime(f)};base64,${b64Data}` }
      });
    }

    const r = await callGeminiProxy([{ role: 'user', content: contentContents }], 3000);
    if (r.error) { showErr(r.error); return; }
    examTexts[ex.name] = r.text;
  }

  step++;
  setP(70, '종합 분석 생성 중...');

  rawText = Object.entries(examTexts)
    .map(([n, t]) => `${'='.repeat(50)}\n[${n}]\n${'='.repeat(50)}\n${t}`)
    .join('\n\n');

  const r2 = await callGeminiProxy([{ role: 'user', content: buildAnalyzePrompt(rawText) }], 4000);
  if (r2.error) { showErr(r2.error); return; }

  setP(100, '완료!');

  const txt = r2.text;
  analysis.a = cutSection(txt, 'SECTION_A', 'SECTION_B');
  analysis.b = cutSection(txt, 'SECTION_B', 'SECTION_C');
  analysis.c = cutSection(txt, 'SECTION_C', null);

  render('tp0', analysis.a);
  render('tp1', analysis.b);
  render('tp2', analysis.c);
  document.getElementById('tp3').innerHTML =
    `<div class="stitle">수합된 원문 데이터</div><div class="rawbox">${esc(rawText)}</div>`;

  document.getElementById('result').classList.add('show');
  document.getElementById('progWrap').style.display = 'none';
  document.getElementById('status').style.display   = 'none';
  document.getElementById('result').scrollIntoView({ behavior:'smooth' });
}

// ── 프롬프트 ────────────────────────────────────
function buildExtractPrompt(examName) {
  return `당신은 검사 결과지에서 텍스트를 정밀하게 추출하는 전문가입니다.
첨부 이미지는 학생의 [${examName}] 결과지입니다.

[추출 규칙]
1. 제목, 영역명, 수준 표현, 수치 점수를 정확히 정리하세요.
2. 설명 문단 전문과 "학생 특성 및 지도 방향" 같은 서술형 텍스트를 빠짐없이 누락 없이 읽으세요.
3. 학생 이름이 있다면 무조건 "이 학생"으로 익명 처리하여 출력하세요.`;
}

function buildAnalyzePrompt(collectedText) {
  return `당신은 초등학교 교사를 돕는 학습자 분석 전문가입니다. 아래 데이터를 분석하여 정해진 규칙대로 마크다운 보고서를 작성하세요.

${collectedText}

## SECTION_A 인지·정의·행동 특성
### 인지적 특성
### 정의적 특성
### 행동적 특성

## SECTION_B 교육적 시사점
### 강점 — 바로 활용할 수 있는 것
### 지원이 필요한 영역
### 교사가 특히 주의해야 할 점

## SECTION_C 수업설계 제안
### HEAL 단계별 추천 역할
- H단계 (탐구·Hook):
- E단계 (탐구·Explore):
- A단계 (적용·Apply):
- L단계 (공유·Launch):
### 핵심 질문 개인화 방향
### 피드백 방식 추천`;
}

// ── Gemini Vercel 프록시 호출 (OpenAI API 규격 대응) ──────────────────────────────
async function callGeminiProxy(messages, maxTokens) {
  try {
    const resp = await fetch('/api/analyze', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'gemini-1.5-pro',
        max_tokens: maxTokens,
        messages: messages
      })
    });
    const data = await resp.json();
    if (!resp.ok) return { error: `서버 오류 (${resp.status}): ${data.error?.message || JSON.stringify(data)}` };
    return { text: data.choices[0].message.content || '' };
  } catch (e) {
    return { error: `네트워크 오류: ${e.message}\n(vercel.json 설정 및 환경변수 설정을 다시 확인해 주세요.)` };
  }
}

// ── 섹션 추출 ────────────────────────────────────
function cutSection(text, start, end) {
  const si = text.indexOf('## ' + start);
  if (si === -1) return text;
  const ei = end ? text.indexOf('## ' + end, si + 1) : text.length;
  return text.slice(si + ('## ' + start).length, ei === -1 ? text.length : ei).trim();
}

// ── 렌더링 ──────────────────────────────────────
function render(id, md) {
  const el = document.getElementById(id);

  let healHtml = '';
  if (md.includes('H단계') && md.includes('L단계')) {
    const steps = [
      { k:'H', re:/- H단계[^:]*:\s*(.*?)(?=\n- [EAL]단계|\n###|$)/s },
      { k:'E', re:/- E단계[^:]*:\s*(.*?)(?=\n- [AL]단계|\n###|$)/s },
      { k:'A', re:/- A단계[^:]*:\s*(.*?)(?=\n- [L]단계|\n###|$)/s },
      { k:'L', re:/- L단계[^:]*:\s*(.*?)(?=\n###|$)/s },
    ];
    healHtml = '<div class="heal-row">' + steps.map(({ k, re }) => {
      const m = md.match(re);
      const desc = m ? m[1].trim().replace(/\n/g,' ') : '';
      return `<div class="hcard hcard-${k}"><div class="hstep">${k}</div><div class="hdesc">${esc(desc)}</div></div>`;
    }).join('') + '</div>';
    md = md.replace(/### HEAL 단계별 추천 역할[\s\S]*?(?=###|$)/, '### HEAL 단계별 추천 역할\n' + '[[HEAL]]');
  }

  let html = md
    .replace(/^### (.+)$/gm, '<div class="stitle">$1</div>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, (_, t) => alertify(t))
    .replace(/\[\[HEAL\]\]/, healHtml)
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/^([^<\n].{2,})$/gm, '<p>$1</p>');

  el.innerHTML = `<div class="card">${html}</div>`;
}

function alertify(text) {
  let cls = 'al-b';
  if (/취약|부진|부족|어려움|낮음|오답|주의|갈등/.test(text)) cls = 'al-r';
  else if (/강점|높음|정답|우수|잘|긍정|탁월|뛰어남/.test(text)) cls = 'al-g';
  else if (/지원|필요|개선|보완|지도|연습/.test(text)) cls = 'al-a';
  return `<div class="al ${cls}">· ${esc(text)}</div>`;
}

function setP(pct, msg) {
  document.getElementById('progWrap').style.display = 'block';
  document.getElementById('progBar').style.width    = pct + '%';
  document.getElementById('status').style.display   = 'block';
  document.getElementById('status').textContent     = msg;
}
function showErr(msg) {
  const el = document.getElementById('errBox');
  el.style.display = msg ? 'block' : 'none';
  el.textContent   = msg;
}
function tab(idx, btn) {
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  document.querySelectorAll('.tpanel').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tp' + idx).classList.add('on');
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function dlTxt() {
  const content = [
    '[ⓐ 인지·정의·행동 특성]', analysis.a, '',
    '[ⓑ 교육적 시사점]', analysis.b, '',
    '[ⓒ 수업설계 제안]', analysis.c, '',
    '[수합 원문]', rawText
  ].join('\n');
  dl(content, '학생_심층분석.txt', 'text/plain');
}
function dlHtml() {
  const h = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<title>학생 심층 분석 리포트</title>

function dl(content, filename, type) {

  });
